<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Request Diagnostic Review</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    background-color: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 60px auto;
    padding: 20px;
}
h1 {
    font-weight: 500;
}
p {
    color: #aaa;
}
input, textarea {
    width: 100%;
    padding: 10px;
    margin: 12px 0;
    background: #111;
    border: 1px solid #333;
    color: #fff;
}
button {
    background: #fff;
    color: #000;
    padding: 12px 20px;
    border: none;
    cursor: pointer;
}
button:hover {
    opacity: 0.8;
}
.small {
    font-size: 12px;
    color: #777;
}
</style>
</head>
<body>

<h1>Request Diagnostic Review</h1>

<p>The Authority Coherence Audit™ is deployed selectively.</p>
<p>This submission initiates structural qualification.</p>
<p>All applications are reviewed manually.</p>

<form action="https://formspree.io/f/xaqdzzqj" method="POST">
<input type="hidden" name="_next" value="https://authorityaudit.cauanmartins.com/submitted">
    
    <input type="text" name="Name" placeholder="Name" required>
    
    <input type="email" name="Email" placeholder="Email" required>
    
    <input type="text" name="Website" placeholder="Primary Domain / Website">
    
    <textarea name="Positioning" rows="4" placeholder="Current positioning statement"></textarea>
    
    <textarea name="Why Now" rows="4" placeholder="Why now?"></textarea>
    
   <button type="submit">Initiate Review</button>
</form>

<p class="small">Response window: 3–5 business days. No automated responses.</p>

</body>
</html>
